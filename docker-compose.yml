# Merkle Tree Lab - Trillian dependencies
# Usage: docker compose up -d mysql
version: '3.1'
services:
  mysql:
    image: mysql:8.4
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=trillian
    ports:
      - "3306:3306"
    volumes:
      - ./impl/trillian/storage/mysql/schema/storage.sql:/docker-entrypoint-initdb.d/01-storage.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
